name: Publish bucket-like Pages

on:
  push:
    branches:
      - master

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v6
      - name: Generate index.html
        run: |
          echo '<!doctype html><html><body><h1>Files</h1><ul>' > index.html
          find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -name 'index.html' \
            ! -name 'README.md' \
            | sort \
            | sed 's#^\./##' \
            | awk '{print "<li><a href=\"" $0 "\">" $0 "</a></li>"}' >> index.html
          echo '</ul></body></html>' >> index.html
          touch .nojekyll
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - uses: actions/deploy-pages@v5
